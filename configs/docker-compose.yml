services:
  kibana:
    image: kibana:8.12.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=kibanasor2
      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none #para que kibana confie en el certificado autofirmado
    volumes:
      - ./kibana.yml:/usr/share/kibana/config/kibana.yml
    depends_on:
      - elasticsearch #Aseguramos de que elasticsearch arranque antes que Kibana

  elasticsearch:
    image: elasticsearch:8.12.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=labosor2
      - "ES_JAVA_OPTS=-Xms7g -Xmx7g"
        
  logstash:
    image: logstash:8.12.0
    ports:
      - "5044:5044"
    environment:
      - XPACK_MONITORING_ENABLED=false
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
